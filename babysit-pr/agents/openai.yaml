interface:
  display_name: "PR Babysitter"
  short_description: "Watch PR review comments, CI, and merge conflicts"
  default_prompt: "Use $babysit-pr to monitor the current PR: watch reviewer comments, CI, and merge-conflict status; surface new review feedback before acting on CI or mergeability work; fix valid issues, push updates, and rerun flaky failures up to 3 times. Do not post replies to human-authored review comments unless the user explicitly confirms the exact response. Do not patch unrelated flaky tests, CI infrastructure, dependency outages, runner issues, or other failures that are not caused by the branch. Keep exactly one watcher session active for the PR. If you pause monitoring to patch review/CI feedback, restart --watch yourself immediately after the push in the same turn. Continue polling autonomously after any push/rerun so newly posted review comments are surfaced until a strict terminal stop condition is reached or the user interrupts."
