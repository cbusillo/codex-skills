# GitHub Work Rollup Local Config Example

# Optional: copy this shape to `.local/github-work-rollup.yaml` for private,
# machine-specific report defaults. The copied file is ignored by git.

timezone: America/New_York
default_window: 24h
mode: standup
layout: operator  # Choices: operator, manager, executive
report_recipient: example team
people_index: .local/people.yaml
subjects:
  - example-user
repo_owners:
  - example-org
repositories:
  - example-org/example-repo
summary_level: standard
collection_limit_items: 1000
release_collection_limit: 1000
workflow_collection_limit: 1000
output_path: .local/github-work-rollup/latest.md
include_external_activity: false
include_bots: false
noise_filters:
  labels:
    - dependencies
priority_sections:
  - name: Codex Skill Updates
    repositories:
      - example-org/example-skills
