name: Launchplane Train Validation

on:
  push:
    branches:
      - "launchplane/train/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Validate skill files
        run: |
          set -euo pipefail
          ./scripts/validate-skills.sh
