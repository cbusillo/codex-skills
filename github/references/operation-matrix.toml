schema_version = 2

[metadata]
description = "Machine-readable foundation for public GitHub skill helper operations."
current_transport_semantics = "The transport used by the checked-in implementation today."
selected_transport_semantics = "The reviewed target transport; rows not yet migrated set migration_status=planned and retain explicit current endpoint and quota fields."
quota_bucket_semantics = "Expected bucket for selected_transport; current_quota_bucket records the live bucket on planned rows."
idempotency_semantics = "Provider-side repeat safety for the same logical request; retry policy must also consider write outcome and reconciliation."
terminal_contract_semantics = "Public helpers emit one schema-versioned terminal JSON envelope on stdout; human diagnostics stay on stderr and exit_code matches the process result."
graphql_operation_context_semantics = "GraphQL POST requests are classified explicitly as query, mutation, subscription, or conservative unknown so read failures do not receive mutation write-outcome semantics."
retry_policy_semantics = "Runtime retries are fail-closed and matrix-gated; safe reads may retry provider-classified transient failures, while writes also require confirmed not-started/rejected outcomes or operation-specific reconciliation."
retry_deadline_semantics = "The effective retry deadline is the earlier of GITHUB_RETRY_MAX_WAIT_SECONDS and an inherited absolute GITHUB_RETRY_DEADLINE_AT request deadline; subprocess execution, cooldown coordination, and reconciliation reads share that deadline."
shared_cooldown_semantics = "Cross-process cooldowns are keyed by GitHub host, actor, and quota bucket under CODE_HOME/state/github-retry with advisory locking, atomic state replacement, stale expiry, and post-reset drain spacing."

[[operations]]
id = "github.api.call"
entrypoint = "github/scripts/github_api.py call"
intent = "Execute one body-safe GitHub REST request and emit structured response, actor, quota, and failure evidence."
current_transport = "rest_api"
selected_transport = "rest_api"
endpoint_or_command = "gh api --include --method {method} -H X-GitHub-Api-Version:{version} {path}; request body via --input -"
quota_bucket = "rest_core"
actor_policy = "automation_required"
mutation_class = "passthrough"
idempotency = "delegated"
retry_eligibility = "conditional"
reconciliation_strategy = "fail_closed_write"
retained_graphql_rationale = "No retained GraphQL transport; this command is the shared REST request and diagnostics boundary."
source_refs = ["github/scripts/github_api.py:call_gh", "github/scripts/github_api.py:call_gh_with_retry", "github/scripts/github_api.py:run_with_retry", "github/scripts/github_api.py:SharedCooldownStore", "github/scripts/github_api.py:main"]
test_refs = ["github/scripts/test_github_api.py:test_retry_waits_until_primary_reset_and_succeeds", "github/scripts/test_github_api.py:test_retry_honors_secondary_retry_after", "github/scripts/test_github_api.py:test_retry_outer_deadline_wins_without_second_call", "github/scripts/test_github_api.py:test_unknown_operation_fails_closed_without_repeat", "github/scripts/test_github_api.py:test_shared_cooldown_blocks_second_process_before_remote_call"]

